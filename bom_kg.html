/* ================= 全局状态 ================= */
let network = null;
let allNodes = [];
let allEdges = [];
let currentIndustry = 'all';
let currentLevel = 'all';
let currentMode = 'full';
let currentSearch = '';

/* ================= 构建节点和边 ================= */
function buildGraphData() {
  const nodes = [];
  const edges = [];
  const stockNodeIds = new Set();

  const industryPositions = {
    'semiconductor': { x: -600, y: 0 },
    'newEnergy': { x: -200, y: 0 },
    'medical': { x: 200, y: 0 },
    'ai': { x: 600, y: 0 }
  };

  Object.keys(industryData).forEach(indKey => {
    const industry = industryData[indKey];
    const basePos = industryPositions[indKey] || { x: 0, y: 0 };

    // 行业节点 - 位于中心
    nodes.push({
      id: `ind_${indKey}`,
      label: industry.name,
      title: `${industry.name} - ${industry.description.substring(0, 50)}...`,
      shape: 'dot',
      size: 38,
      color: {
        background: industry.color,
        border: '#ffffff',
        highlight: { background: industry.color, border: '#ffffff' }
      },
      font: { color: '#ffffff', size: 16, face: 'PingFang SC', strokeWidth: 2, strokeColor: '#000000' },
      group: 'industry',
      industry: indKey,
      rawData: industry,
      rawType: 'industry',
      x: basePos.x,
      y: basePos.y,
      physics: { enabled: true }
    });

    // 层级位置偏移 - 实现辐射效果
    const levelOffsets = {
      'up': { dx: 0, dy: -280 },      // 上游 - 向上辐射
      'mid': { dx: 220, dy: 180 },    // 中游 - 向右下辐射
      'down': { dx: -180, dy: 200 }    // 下游 - 向左下辐射
    };

    ['up', 'mid', 'down'].forEach(level => {
      const sectors = industry.sectors[level] || [];
      if (sectors.length === 0) return;

      const offset = levelOffsets[level];
      const levelX = basePos.x + offset.dx;
      const levelY = basePos.y + offset.dy;

      // 层级节点 - 围绕行业节点辐射
      nodes.push({
        id: `lvl_${indKey}_${level}`,
        label: LEVEL_NAMES[level],
        title: `${industry.name} - ${LEVEL_NAMES[level]}`,
        shape: 'diamond',
        size: 22,
        color: {
          background: LEVEL_COLORS[level],
          border: '#ffffff',
          highlight: { background: LEVEL_COLORS[level], border: '#ffffff' }
        },
        font: { color: '#ffffff', size: 13, face: 'PingFang SC', strokeWidth: 2, strokeColor: '#000000' },
        group: 'level',
        industry: indKey,
        level: level,
        rawData: { name: LEVEL_NAMES[level], industry: industry.name, level: level },
        rawType: 'level',
        x: levelX,
        y: levelY,
        physics: { enabled: true }
      });

      edges.push({
        id: `e_ind_lvl_${indKey}_${level}`,
        from: `ind_${indKey}`,
        to: `lvl_${indKey}_${level}`,
        color: { color: industry.color, opacity: 0.6 },
        width: 2.5,
        smooth: { type: 'continuous' }
      });

      // 计算环节节点的辐射位置
      const sectorCount = sectors.length;
      const sectorRadius = 160;

      sectors.forEach((sector, index) => {
        // 围绕层级节点均匀分布
        const angle = (index / sectorCount) * Math.PI * 2 - Math.PI / 2;
        const sectorX = levelX + Math.cos(angle) * sectorRadius;
        const sectorY = levelY + Math.sin(angle) * sectorRadius;

        // 环节节点 - 围绕层级节点辐射
        nodes.push({
          id: sector.id,
          label: sector.name,
          title: `${sector.name} - ${sector.desc.substring(0, 60)}...`,
          shape: 'box',
          size: 18,
          color: {
            background: industry.color,
            border: '#ffffff',
            highlight: { background: industry.color, border: '#ffffff' }
          },
          font: { color: '#ffffff', size: 13, face: 'PingFang SC', align: 'center' },
          shapeProperties: { borderRadius: 4 },
          margin: 10,
          group: 'sector',
          industry: indKey,
          level: level,
          rawData: sector,
          rawType: 'sector',
          x: sectorX,
          y: sectorY,
          physics: { enabled: true }
        });

        edges.push({
          id: `e_lvl_sec_${sector.id}`,
          from: `lvl_${indKey}_${level}`,
          to: sector.id,
          color: { color: LEVEL_COLORS[level], opacity: 0.55 },
          width: 1.8,
          smooth: { type: 'continuous' }
        });

        // 股票节点 - 围绕环节节点辐射
        const stockCount = sector.stocks.length;
        sector.stocks.forEach((stock, stockIndex) => {
          const stockId = `stock_${stock.code}`;
          if (!stockNodeIds.has(stockId)) {
            // 围绕环节节点均匀分布
            const stockAngle = (stockIndex / stockCount) * Math.PI * 2 + Math.PI / 4;
            const stockRadius = 100;
            const stockX = sectorX + Math.cos(stockAngle) * stockRadius;
            const stockY = sectorY + Math.sin(stockAngle) * stockRadius;

            stockNodeIds.add(stockId);
            nodes.push({
              id: stockId,
              label: `${stock.name}\n${stock.code}`,
              title: `${stock.name} (${stock.code})`,
              shape: 'dot',
              size: 12,
              color: {
                background: '#2ecc71',
                border: '#ffffff',
                highlight: { background: '#2ecc71', border: '#ffffff' }
              },
              font: { color: '#ffffff', size: 11, face: 'PingFang SC', align: 'center', strokeWidth: 2, strokeColor: '#000000' },
              group: 'stock',
              industry: indKey,
              level: level,
              rawData: stock,
              rawType: 'stock',
              parentSector: sector,
              x: stockX,
              y: stockY,
              physics: { enabled: true }
            });
          }
          edges.push({
            id: `e_sec_stk_${sector.id}_${stock.code}`,
            from: sector.id,
            to: stockId,
            color: { color: '#2ecc71', opacity: 0.45 },
            width: 1.2,
            smooth: { type: 'continuous' }
          });
        });
      });
    });
  });

  allNodes = nodes;
  allEdges = edges;
  return { nodes, edges };
}

/* ================= 过滤节点 ================= */
function applyFilter() {
  if (!network) return;

  let filteredNodes = allNodes.slice();
  let filteredEdges = allEdges.slice();

  // 行业过滤
  if (currentIndustry !== 'all') {
    filteredNodes = filteredNodes.filter(n => n.industry === currentIndustry);
  }
  // 层级过滤
  if (currentLevel !== 'all') {
    filteredNodes = filteredNodes.filter(n => {
      if (n.rawType === 'industry') return true;
      if (n.rawType === 'level') return n.level === currentLevel;
      return n.level === currentLevel;
    });
  }
  // 显示模式过滤
  if (currentMode === 'sector') {
    // 仅环节：保留行业+层级+环节，去除股票节点
    filteredNodes = filteredNodes.filter(n => n.rawType !== 'stock');
  } else if (currentMode === 'minimal') {
    // 简洁模式：只保留行业和层级节点
    filteredNodes = filteredNodes.filter(n => n.rawType === 'industry' || n.rawType === 'level');
  }
  // 搜索过滤
  if (currentSearch && currentSearch.trim().length > 0) {
    const kw = currentSearch.trim().toLowerCase();
    const matchedIds = new Set();
    filteredNodes.forEach(n => {
      const name = (n.rawData.name || n.rawData.label || '').toLowerCase();
      const code = (n.rawData.code || '').toString().toLowerCase();
      if (name.includes(kw) || code.includes(kw)) {
        matchedIds.add(n.id);
      }
    });
    if (matchedIds.size > 0) {
      filteredNodes = filteredNodes.filter(n => matchedIds.has(n.id));
    }
  }

  // 根据节点过滤边
  const visibleIds = new Set(filteredNodes.map(n => n.id));
  filteredEdges = filteredEdges.filter(e => visibleIds.has(e.from) && visibleIds.has(e.to));

  network.setData({
    nodes: new vis.DataSet(filteredNodes),
    edges: new vis.DataSet(filteredEdges)
  });

  updateStats(filteredNodes, filteredEdges);
  setTimeout(() => network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } }), 100);
}

/* ================= 更新统计 ================= */
function updateStats(nodes, edges) {
  const sectorCount = nodes.filter(n => n.rawType === 'sector').length;
  const stockCount = nodes.filter(n => n.rawType === 'stock').length;
  const indCount = new Set(nodes.filter(n => n.rawType === 'industry').map(n => n.industry)).size;

  document.getElementById('statsBar').innerHTML =
    `<b>${nodes.length}</b>节点<span class="sep">|</span><b>${edges.length}</b>关系<span class="sep">|</span><b>${indCount}</b>行业<span class="sep">|</span><b>${sectorCount}</b>环节<span class="sep">|</span><b>${stockCount}</b>股票`;

  document.getElementById('headerStats').innerHTML =
    `涵盖 <b>${Object.keys(industryData).length}</b> 大行业 · <b>${countTotalSectors()}</b> 个产业链环节 · <b>${countTotalStocks()}</b> 家代表企业`;
}

function countTotalSectors() {
  let total = 0;
  Object.values(industryData).forEach(ind => {
    Object.values(ind.sectors).forEach(arr => { total += arr.length; });
  });
  return total;
}
function countTotalStocks() {
  let total = 0;
  Object.values(industryData).forEach(ind => {
    Object.values(ind.sectors).forEach(arr => {
      arr.forEach(s => { total += s.stocks.length; });
    });
  });
  return total;
}

/* ================= 显示详情 ================= */

      <div class="sub-title">行业总览</div>
      <div class="detail-section"><h3>行业概述</h3><p>${d.description}</p></div>
      <div class="detail-section">
        <h3>核心数据</h3>
        <div class="info-grid">
          <div class="info-item"><span class="label">市场规模</span><span class="value">${d.marketSize}</span></div>
          <div class="info-item" style="border-left-color:#2ecc71"><span class="label">增长速度</span><span class="value">${d.growthRate}</span></div>
        </div>
      </div>
      <div class="detail-section"><h3>上下游关系</h3><div class="flow-diagram">${renderFlowDiagram(d)}</div></div>
      <div class="detail-section"><h3>产业链环节</h3>${sectorHtml}</div>
    `;
  } else if (node.rawType === 'level') {
    const d = node.rawData;
    panel.innerHTML = `
      <h2 style="color:${LEVEL_COLORS[d.level]}">${d.industry} - ${d.name}</h2>
      <div class="sub-title">产业链层级</div>
      <div class="detail-section">
        <h3>层级说明</h3>
        <p>${getLevelDescription(d.level)}</p>
      </div>
      <div class="detail-section"><h3>上下游关系</h3><div class="flow-diagram">${renderFlowDiagram(null, d.level)}</div></div>
    `;
  } else if (node.rawType === 'sector') {
    const d = node.rawData;
    const indColor = INDUSTRY_COLORS[node.industry];
    const stocksHtml = d.stocks.map(s =>
      `<div class="stock-item"><div class="name">${s.name}</div><div class="code">${s.code}</div></div>`
    ).join('');
    panel.innerHTML = `
      <h2 style="color:${indColor}">${d.name}</h2>
      <div class="sub-title">${INDUSTRY_NAMES[node.industry]} · ${LEVEL_NAMES[d.level]}环节</div>
      <div class="detail-section"><h3>环节描述</h3><p>${d.desc}</p></div>
      <div class="detail-section">
        <h3>关键指标</h3>
        <div class="info-grid">
          <div class="info-item"><span class="label">技术壁垒</span><span class="value">${d.barrier}</span></div>
          <div class="info-item" style="border-left-color:#2ecc71"><span class="label">增长速度</span><span class="value">${d.growth}</span></div>
          <div class="info-item" style="border-left-color:#f39c12"><span class="label">市场规模</span><span class="value">${d.market}</span></div>
        </div>
      </div>
      <div class="detail-section"><h3>供需状况</h3><p>${d.supply}</p></div>
      <div class="detail-section"><h3>上下游关系</h3><div class="flow-diagram">${renderFlowDiagram(null, d.level)}</div></div>
      <div class="detail-section"><h3>代表企业 (${d.stocks.length}家)</h3><div class="stock-list">${stocksHtml}</div></div>
    `;
  } else if (node.rawType === 'stock') {
    const d = node.rawData;
    const parent = node.parentSector;
    const indColor = INDUSTRY_COLORS[node.industry];
    panel.innerHTML = `
      <h2 style="color:#2ecc71">${d.name}</h2>
      <div class="sub-title">A股代码 ${d.code} · ${INDUSTRY_NAMES[node.industry]} · ${LEVEL_NAMES[node.level]}</div>
      <div class="detail-section">
        <h3>企业简介</h3>
        <p>${d.name}是A股${LEVEL_NAMES[node.level]}环节的代表性企业，股票代码${d.code}。公司专注于${parent ? parent.name : '相关'}领域的产品研发、生产与销售，受益于${INDUSTRY_NAMES[node.industry]}产业的快速发展与国产替代进程。</p>
      </div>
      ${parent ? `
      <div class="detail-section"><h3>所属产业链环节</h3>
        <div class="info-grid">
          <div class="info-item" style="grid-column: span 2; border-left-color:${indColor}">

          <div class="info-item" style="border-left-color:#2ecc71"><span class="label">增长速度</span><span class="value">${parent.growth}</span></div>
          <div class="info-item" style="border-left-color:#f39c12; grid-column: span 2"><span class="label">市场规模</span><span class="value">${parent.market}</span></div>

function renderSectorsOfIndustry(industry) {
  let html = '';
  ['up', 'mid', 'down'].forEach(level => {
    const sectors = industry.sectors[level] || [];
    if (sectors.length === 0) return;
    html += `<div style="margin-bottom:12px">
      <div style="font-size:12px;color:${LEVEL_COLORS[level]};margin-bottom:6px;font-weight:600">◆ ${LEVEL_NAMES[level]}</div>
      ${sectors.map(s =>
        `<div class="stock-item" style="border-color:${industry.color};background:linear-gradient(90deg,${industry.color}22,transparent)">
          <div class="name">${s.name}</div>
          <div class="code">${s.stocks.map(st => st.name).join(' · ')}</div>
        </div>`
      ).join('')}
    </div>`;
  });
  return html || '<p style="color:#6a85ad;font-size:13px">暂无环节数据</p>';
}

function renderFlowDiagram(industry, highlightLevel) {
  const upActive = highlightLevel === 'up' ? 'box-shadow:0 0 20px #9b59b6;border:2px solid #fff' : '';
  const midActive = highlightLevel === 'mid' ? 'box-shadow:0 0 20px #1abc9c;border:2px solid #fff' : '';
  const downActive = highlightLevel === 'down' ? 'box-shadow:0 0 20px #e67e22;border:2px solid #fff' : '';
  return `<div class="flow-layers">
    <div class="flow-layer up" style="${upActive}">上游<br>(原材料/设备)</div>
    <span class="flow-arrow">→</span>
    <div class="flow-layer mid" style="${midActive}">中游<br>(制造/代工)</div>
    <span class="flow-arrow">→</span>
    <div class="flow-layer down" style="${downActive}">下游<br>(产品/应用)</div>
  </div>`;
}

function getLevelDescription(level) {
  const desc = {
    up: '上游环节主要提供原材料、核心零部件和专用设备，是产业链的基础。往往技术壁垒高、资源依赖性强、研发投入大，国产替代空间广阔。',
    mid: '中游环节主要将上游原材料加工为核心组件或成品，属于制造与代工环节。规模效应显著，产能建设和良率控制是关键竞争力。',
    down: '下游环节面向终端客户，提供最终产品或应用解决方案。品牌、渠道、用户体验和差异化功能是主要竞争维度。'
  };
  return desc[level] || '';
}

/* ================= 初始化网络 ================= */
function initNetwork() {
  buildGraphData();

  const container = document.getElementById('graph');
  const data = {
    nodes: new vis.DataSet(allNodes),
    edges: new vis.DataSet(allEdges)
  };

  const options = {
    nodes: {
      borderWidth: 2,
      borderWidthSelected: 3,
      shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 8, x: 2, y: 2 }
    },
    edges: {
      smooth: { type: 'continuous', roundness: 0.4 },
      hoverWidth: 2
    },
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {
        gravitationalConstant: -600,
        centralGravity: 0.05,
        springLength: 220,
        springConstant: 0.04,
        avoidOverlap: 1.5,
        damping: 0.6
      },
      maxVelocity: 30,
      minVelocity: 0.2,
      stabilization: { enabled: true, iterations: 500, updateInterval: 20 }
    },
    interaction: {
      hover: true,
      tooltipDelay: 150,
      zoomView: true,
      dragView: true,
      multiselect: false
    },
    layout: { 
      improvedLayout: true,
      hierarchical: {
        enabled: false,
        levelSeparation: 150,
        nodeSpacing: 80,
        treeSpacing: 200,
        blockShifting: true,
        edgeMinimization: true,
        parentCentralization: true,
        direction: 'UD',
        sortMethod: 'directed'
      }
    }
  };

  network = new vis.Network(container, data, options);

  network.on('click', (params) => {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      const node = allNodes.find(n => n.id === nodeId);
      if (node) showNodeDetail(node);
    }
  });

  network.on('doubleClick', (params) => {
    if (params.nodes.length > 0) {
      network.focus(params.nodes[0], { scale: 1.8, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
    }
  });

  updateStats(allNodes, allEdges);
}

/* ================= 事件绑定 ================= */
function bindEvents() {
  // 行业按钮
  document.querySelectorAll('#industryBtns .btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#industryBtns .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentIndustry = btn.dataset.industry;
      applyFilter();
    });
  });
  // 层级按钮
  document.querySelectorAll('#levelBtns .btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#levelBtns .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLevel = btn.dataset.level;
      applyFilter();
    });
  });
  // 显示模式按钮
  document.querySelectorAll('#modeBtns .btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#modeBtns .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      applyFilter();
    });
  });
  // 搜索
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = e.target.value;
      applyFilter();
    }, 300);
  });
  // 工具栏
  document.getElementById('zoomIn').addEventListener('click', () => network.scale(network.getScale() * 1.3));
  document.getElementById('zoomOut').addEventListener('click', () => network.scale(network.getScale() * 0.75));
  document.getElementById('fit').addEventListener('click', () => network.fit({ animation: { duration: 600 } }));
  document.getElementById('refresh').addEventListener('click', () => {
    network.stopSimulation();
    initNetwork();
    currentIndustry = 'all'; currentLevel = 'all'; currentMode = 'full'; currentSearch = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('#industryBtns .btn').forEach((b, i) => b.classList.toggle('active', i === 0));
    document.querySelectorAll('#levelBtns .btn').forEach((b, i) => b.classList.toggle('active', i === 0));
    document.querySelectorAll('#modeBtns .btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  });
}

/* ================= 启动 ================= */
window.addEventListener('DOMContentLoaded', () => {
  initNetwork();
  bindEvents();
});
</script>
